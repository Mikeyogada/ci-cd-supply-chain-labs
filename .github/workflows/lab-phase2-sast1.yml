name: SAST - Basic

#This workflow is triggered on push and pull request events to the main branch. It performs a Static Application Security Testing (SAST) scan on the codebase to identify potential security vulnerabilities.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

#permissions required for this workflow to run, in this case we only need read access to the repository contents to perform the SAST scan.
permissions:
  contents: read

#jobs that should run as part of this workflow
jobs:
  sast-scan:
    runs-on: ubuntu-latest
    steps: #checkout the code from the repository to the runner, which allows the subsequent steps to access the codebase for analysis.ß
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep
      
    # Run the Semgrep scan with the specified configuration and output format. The results are saved to a file named semgrep-results.json for further analysis.
      - name: Run Semgrep scan #Severity level is set to ERROR, which means that only issues classified as errors will be included in the results. The output format is set to JSON, which allows for easy parsing and analysis of the results.
        run: |
            semgrep --config=auto --severity ERROR --json -o semgrep-results.json
        #The --config=auto option tells Semgrep to automatically select the appropriate rules based on the codebase being scanned. This allows for a more tailored and effective scan, as Semgrep will choose rules that are relevant to the programming languages and frameworks used in the project.

    # upload as an artifact to be downloaded later, this allows you to access the results of the SAST scan after the workflow has completed, which can be useful for further analysis or reporting.
      - name: Upload Semgrep results
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep-results.json
