name: SAST - Diff Aware scan
#This workflow is triggered on pull request events. It performs a Static Application Security Testing (SAST) scan on the codebase, but only analyzes the changes made in the pull request compared to the main branch. This allows for a more focused and efficient scan, as it targets only the modified code.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  semgrep-diff-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: pip install semgrep

      - name: Run semgrep (Diff Aware)
        run: |
            semgrep ci --config=auto --severity ERROR --sarif -o semgrep-results.sarif
        #The semgrep ci command is used to run Semgrep in a continuous integration environment. The --diff option is not needed here because the ci command automatically detects the changes in the pull request
            
        #The --diff origin/main option tells Semgrep to compare the current code with the main branch and only analyze the differences. This allows for a more targeted scan, focusing on the changes introduced in the pull request.
      - name: Upload SARIF results
        if: always() #This ensures that the upload step runs regardless of the success or failure of the previous steps, allowing you to capture and analyze the results even if the scan encounters issues.
        uses: github/codeql-action/upload-sarif@v3
        with:
            sarif_file: semgrep-results.sarif
